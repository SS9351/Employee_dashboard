services:
  # Python API
  - type: web
    name: sahastra-api
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sahastra-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  # Native Render PostgreSQL Database
  - name: sahastra-db
    databaseName: sahastra_db
    user: sahastra_admin
